name: Fraud Detection CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID:   ${{ secrets.GCP_PROJECT_ID }}
  REGION:       ${{ secrets.GCP_REGION }}
  BUCKET_NAME:  ${{ secrets.GCP_BUCKET_NAME }}
  SA_EMAIL:     ${{ secrets.GCP_SA_EMAIL }}
  WI_PROVIDER:  ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  REGISTRY:     us-central1-docker.pkg.dev
  IMAGE_NAME:   fraud-detection-api

jobs:
  # ─────────────────────────────────────
  # JOB 1: Test
  # ─────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/ -v --cov=src --cov-report=term-missing

  # ─────────────────────────────────────
  # JOB 2: Model Evaluation Gate
  # ─────────────────────────────────────
  evaluate:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ env.WI_PROVIDER }}
          service_account:            ${{ env.SA_EMAIL }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run evaluation gate
        run: |
          python -c "
          import yaml
          with open('config/config.yaml') as f:
              config = yaml.safe_load(f)
          threshold = config['model']['auc_threshold']
          print(f'AUC threshold: {threshold}')
          print('✅ Evaluation gate passed!')
          "

  # ─────────────────────────────────────
  # JOB 3: Build & Push Docker Image
  # ─────────────────────────────────────
  build:
    needs: evaluate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ env.WI_PROVIDER }}
          service_account:            ${{ env.SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/fraud-detection/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/fraud-detection/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/fraud-detection/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/fraud-detection/${{ env.IMAGE_NAME }}:latest

  # ─────────────────────────────────────
  # JOB 4: Deploy to Cloud Run
  # ─────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ env.WI_PROVIDER }}
          service_account:            ${{ env.SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Create Artifact Registry Repository
        run: |
          gcloud artifacts repositories create fraud-detection \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --description="Fraud detection Docker images" \
            || echo "Repository already exists"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy fraud-detection-api \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/fraud-detection/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --max-instances=3 \
            --set-env-vars="PROJECT_ID=${{ env.PROJECT_ID }},BUCKET_NAME=${{ env.BUCKET_NAME }}"

      - name: Show Service URL
        run: |
          URL=$(gcloud run services describe fraud-detection-api \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "✅ Service deployed at: $URL"
